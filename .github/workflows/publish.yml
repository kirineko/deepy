name: Publish to PyPI

on:
  push:
    tags:
      - "*.*.*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.12

      - name: Run tests
        run: uv run pytest

      - name: Lint
        run: uv run ruff check

      - name: Type check
        run: uv run ty check src

      - name: Build
        run: uv build --clear

      - name: Publish
        run: uv publish
